<!DOCTYPE html>
<html>
<head>
    <title>🚀 Crypto Crash Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-board {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .game-display {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .game-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .status-item {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 10px;
            min-width: 120px;
        }
        
        .multiplier-display {
            font-size: 4em;
            font-weight: bold;
            margin: 30px 0;
            text-shadow: 0 0 20px currentColor;
            transition: all 0.3s ease;
        }
        
        .multiplier-active {
            color: #00ff88;
            animation: pulse 1s infinite;
        }
        
        .multiplier-crashed {
            color: #ff4444;
            animation: crash 0.5s ease-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes crash {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .controls-panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
        }
        
        .controls-panel h3 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1em;
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .bet-button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }
        
        .bet-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        .cashout-button {
            background: linear-gradient(45deg, #ff9800, #f57c00);
            color: white;
        }
        
        .cashout-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }
        
        .wallet-button {
            background: linear-gradient(45deg, #2196F3, #1976D2);
            color: white;
            grid-column: span 2;
        }
        
        .wallet-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }
        
        .wallet-info {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .log-section {
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .log {
            background: #000;
            color: #00ff00;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .log::-webkit-scrollbar {
            width: 8px;
        }
        
        .log::-webkit-scrollbar-track {
            background: #333;
        }
        
        .log::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }
        
        .players-list {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .connected {
            background: #4CAF50;
            color: white;
        }
        
        .disconnected {
            background: #f44336;
            color: white;
        }
        
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .multiplier-display {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">Connecting...</div>
    
    <div class="container">
        <div class="header">
            <h1>🚀 CRYPTO CRASH</h1>
            <p>Real-time multiplayer crash game with live crypto prices</p>
        </div>
        
        <div class="game-board">
            <div class="game-display">
                <div class="status-bar">
                    <div class="status-item">
                        <div>Status</div>
                        <div id="status">Connecting...</div>
                    </div>
                    <div class="status-item">
                        <div>Round</div>
                        <div id="roundId">-</div>
                    </div>
                    <div class="status-item">
                        <div>Crash Point</div>
                        <div id="crashPoint">-</div>
                    </div>
                </div>
                
                <div class="multiplier-display" id="multiplierDisplay">
                    <span id="multiplier">1.00x</span>
                </div>
                
                <div class="players-list">
                    <h4>🎮 Active Players</h4>
                    <div id="playersList"></div>
                </div>
            </div>
            
            <div class="controls-panel">
                <h3>🎯 Game Controls</h3>
                
                <div class="input-group">
                    <label>👤 Player ID</label>
                    <input type="text" id="playerId" placeholder="Enter your player ID" value="player1">
                </div>
                
                <div class="input-group">
                    <label>💰 Bet Amount (USD)</label>
                    <input type="number" id="betAmount" placeholder="Enter bet amount" value="10" step="0.01" min="0.01">
                </div>
                
                <div class="input-group">
                    <label>🪙 Cryptocurrency</label>
                    <select id="currency">
                        <option value="BTC">₿ Bitcoin (BTC)</option>
                        <option value="ETH">Ξ Ethereum (ETH)</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button class="bet-button" onclick="placeBet()">🎲 Place Bet</button>
                    <button class="cashout-button" onclick="cashOut()">💸 Cash Out</button>
                    <button class="wallet-button" onclick="getWallet()">👛 Check Wallet</button>
                </div>
                
                <div class="wallet-info" id="walletInfo" style="display: none;">
                    <h4>💼 Your Wallet</h4>
                    <div id="walletDetails"></div>
                </div>
            </div>
        </div>
        
        <div class="log-section">
            <div class="log-header">
                <h3>📊 Game Log</h3>
                <button onclick="clearLog()" style="padding: 5px 10px; background: #666; color: white; border: none; border-radius: 5px;">Clear</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentMultiplier = 1;
        let gameStatus = 'waiting';

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Socket event listeners
        socket.on('connect', () => {
            log('🟢 Connected to server');
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = '🟢 Connected';
            statusEl.className = 'connection-status connected';
        });
        
        socket.on('disconnect', () => {
            log('🔴 Disconnected from server');
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = '🔴 Disconnected';
            statusEl.className = 'connection-status disconnected';
        });

        socket.on('gameState', (state) => {
            updateGameState(state);
            log(`🎮 Game state updated: ${state.status.toUpperCase()}`);
        });

        socket.on('roundStart', (state) => {
            updateGameState(state);
            document.querySelector('.bet-button').disabled = false;
            document.querySelector('.cashout-button').disabled = false;
            log('🚀 New round started!');
        });

        socket.on('multiplierUpdate', (data) => {
            currentMultiplier = data.multiplier;
            document.getElementById('multiplier').textContent = data.multiplier.toFixed(2) + 'x';
            
            const multiplierEl = document.getElementById('multiplierDisplay');
            multiplierEl.className = 'multiplier-display multiplier-active';
            if (data.multiplier > 10) {
                multiplierEl.style.color = '#ff0000';
            } else if (data.multiplier > 5) {
                multiplierEl.style.color = '#ff6600';
            } else if (data.multiplier > 2) {
                multiplierEl.style.color = '#ffaa00';
            } else {
                multiplierEl.style.color = '';
            }
        });

        socket.on('playerCashout', (data) => {
            log(`💸 ${data.playerId} cashed out at ${data.multiplier.toFixed(2)}x for ${data.payout.toFixed(8)} crypto ($${data.usdValue.toFixed(2)})`);
        });

        socket.on('roundCrash', (data) => {
            gameStatus = 'crashed';
            updateGameState({ status: 'crashed', crashPoint: data.crashPoint, multiplier: data.finalMultiplier, bets: [] });
            log(`💥 Round crashed at ${data.crashPoint.toFixed(2)}x`);
        });

        socket.on('cashoutSuccess', (data) => {
            log(`✅ Cashout successful! Payout: ${data.payout.toFixed(8)} crypto ($${data.usdValue.toFixed(2)}) at ${data.multiplier.toFixed(2)}x`);
            log(`🔗 Transaction: ${data.transactionHash}`);
            document.querySelector('.cashout-button').disabled = true;
            setTimeout(getWallet, 500);
        });

        socket.on('cashoutError', (data) => {
            log(`❌ Cashout error: ${data.error}`);
        });

        function updateGameState(state) {
            gameStatus = state.status;
            const statusEl = document.getElementById('status');
            const multiplierEl = document.getElementById('multiplierDisplay');
            
            statusEl.textContent = state.status.toUpperCase();
            document.getElementById('roundId').textContent = state.roundId || '-';
            document.getElementById('multiplier').textContent = state.multiplier.toFixed(2) + 'x';
            
            // Update multiplier styling based on status
            multiplierEl.className = 'multiplier-display';
            multiplierEl.style.color = '';
            if (state.status === 'active') {
                multiplierEl.classList.add('multiplier-active');
            } else if (state.status === 'crashed') {
                multiplierEl.classList.add('multiplier-crashed');
                document.getElementById('crashPoint').textContent = state.crashPoint.toFixed(2) + 'x';
            } else {
                document.getElementById('crashPoint').textContent = '-';
            }
            
            // Update players list
            updatePlayersList(state.bets || []);
        }
        
        function updatePlayersList(bets) {
            const playersListEl = document.getElementById('playersList');
            if (bets.length === 0) {
                playersListEl.innerHTML = '<div style="text-align: center; opacity: 0.7;">No active bets</div>';
                return;
            }
            
            playersListEl.innerHTML = bets.map(bet => `
                <div class="player-item">
                    <span>${bet.playerId}</span>
                    <span>$${bet.usdAmount} ${bet.currency}</span>
                    <span>${bet.cashedOut ? '✅ Cashed Out' : '🎲 Active'}</span>
                </div>
            `).join('');
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function placeBet() {
            const playerId = document.getElementById('playerId').value;
            const usdAmount = parseFloat(document.getElementById('betAmount').value);
            const currency = document.getElementById('currency').value;
            
            if (!playerId || !usdAmount || usdAmount <= 0) {
                log('❌ Please enter valid player ID and bet amount');
                return;
            }

            try {
                const response = await fetch('/api/bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerId, usdAmount, currency })
                });
                
                const result = await response.json();
                if (response.ok) {
                    log(`🎲 Bet placed: $${usdAmount} (${result.bet.cryptoAmount.toFixed(8)} ${currency})`);
                    log(`🔗 Transaction: ${result.transactionHash}`);
                    // Refresh wallet after bet
                    setTimeout(getWallet, 500);
                } else {
                    log(`❌ Bet error: ${result.error}`);
                }
            } catch (error) {
                log(`❌ Bet error: ${error.message}`);
            }
        }

        function cashOut() {
            const playerId = document.getElementById('playerId').value;
            socket.emit('cashout', { playerId });
        }

        async function getWallet() {
            const playerId = document.getElementById('playerId').value;
            
            try {
                const response = await fetch(`/api/wallet/${playerId}`);
                const result = await response.json();
                
                if (response.ok) {
                    log(`💼 Wallet for ${playerId}:`);
                    
                    const walletInfo = document.getElementById('walletInfo');
                    const walletDetails = document.getElementById('walletDetails');
                    
                    walletDetails.innerHTML = result.balances.map(balance => `
                        <div style="display: flex; justify-content: space-between; margin: 8px 0; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 5px;">
                            <span>${balance.currency === 'BTC' ? '₿' : 'Ξ'} ${balance.currency}</span>
                            <span>${balance.balance.toFixed(8)}</span>
                            <span style="color: #4CAF50;">$${balance.usdValue.toFixed(2)}</span>
                        </div>
                    `).join('');
                    
                    walletInfo.style.display = 'block';
                    
                    result.balances.forEach(balance => {
                        log(`  ${balance.currency === 'BTC' ? '₿' : 'Ξ'} ${balance.currency}: ${balance.balance.toFixed(8)} ($${balance.usdValue.toFixed(2)})`);
                    });
                } else {
                    log(`❌ Wallet error: ${result.error}`);
                }
            } catch (error) {
                log(`❌ Wallet error: ${error.message}`);
            }
        }

        // Initial wallet check
        setTimeout(getWallet, 1000);
        
        // Add some interactive features
        document.getElementById('betAmount').addEventListener('input', function() {
            const amount = parseFloat(this.value);
            if (amount < 0.01) {
                this.style.borderColor = '#f44336';
            } else {
                this.style.borderColor = 'transparent';
            }
        });
        
        // Enter key support for betting
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                if (gameStatus === 'waiting') placeBet();
            }
        });
        
        // Auto-refresh wallet every 30 seconds
        setInterval(() => {
            if (document.getElementById('playerId').value) {
                getWallet();
            }
        }, 30000);
    </script>
</body>
</html>
